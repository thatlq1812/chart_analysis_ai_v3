# =============================================================================
# SLM Training Configuration
# =============================================================================
# Configuration for fine-tuning Small Language Models on chart analysis tasks.
# See: .github/instructions/module-training.instructions.md

slm_training:
  # ---------------------------------------------------------------------------
  # Base Model Selection
  # ---------------------------------------------------------------------------
  base_model: "Qwen/Qwen2.5-1.5B-Instruct"
  model_revision: "main"  # Pin for reproducibility
  
  # Candidates (uncomment to switch):
  # base_model: "Qwen/Qwen2.5-3B-Instruct"
  # base_model: "meta-llama/Llama-3.2-1B-Instruct"
  # base_model: "meta-llama/Llama-3.2-3B-Instruct"
  
  # ---------------------------------------------------------------------------
  # LoRA Configuration
  # ---------------------------------------------------------------------------
  lora:
    rank: 16                    # LoRA rank (8-64)
    alpha: 32                   # LoRA alpha (typically 2x rank)
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
    bias: "none"
    task_type: "CAUSAL_LM"
  
  # ---------------------------------------------------------------------------
  # Training Parameters
  # ---------------------------------------------------------------------------
  training:
    num_train_epochs: 3
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 4
    learning_rate: 2.0e-4
    lr_scheduler_type: "cosine"
    warmup_ratio: 0.05
    weight_decay: 0.01
    max_seq_length: 512
    fp16: true
    bf16: false                 # RTX 3060 does not support bf16
    gradient_checkpointing: true
    optim: "paged_adamw_32bit"
    
    # Logging
    logging_steps: 10
    logging_first_step: true
    
    # Saving
    eval_steps: 100
    save_steps: 200
    save_total_limit: 3
    load_best_model_at_end: true
    metric_for_best_model: "eval_loss"
    greater_is_better: false
  
  # ---------------------------------------------------------------------------
  # Quantization (QLoRA for RTX 3060 6GB)
  # ---------------------------------------------------------------------------
  quantization:
    use_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "float16"
    bnb_4bit_use_double_quant: true
  
  # ---------------------------------------------------------------------------
  # Data
  # ---------------------------------------------------------------------------
  data:
    train_file: "data/slm_training/train.json"
    val_file: "data/slm_training/val.json"
    test_file: "data/slm_training/test.json"
    
    # Format
    format: "chatml"            # ChatML conversation format
    max_samples: null            # null = use all, set number to limit
  
  # ---------------------------------------------------------------------------
  # Curriculum Learning
  # ---------------------------------------------------------------------------
  curriculum:
    enabled: true
    stages: [1, 2, 3, 4]
    current_stage: 1            # Start from Stage 1 (structure)
    # Stage 1: Chart type + axis labels (easy)
    # Stage 2: Value extraction + OCR correction
    # Stage 3: Trends + comparisons (multi-series)
    # Stage 4: Noisy OCR + complex layouts (hard)
  
  # ---------------------------------------------------------------------------
  # Output
  # ---------------------------------------------------------------------------
  output_dir: "models/slm/qwen2.5-1.5b-chart-lora"
  hub_model_id: null            # HuggingFace Hub (optional)
  
  # ---------------------------------------------------------------------------
  # Evaluation Targets
  # ---------------------------------------------------------------------------
  evaluation:
    json_valid_rate: 0.95       # >95% valid JSON
    field_accuracy: 0.90        # >90% correct fields
    numeric_accuracy: 0.85      # >85% correct values (5% tolerance)
    ocr_correction_rate: 0.80   # >80% OCR errors fixed
    inference_latency_s: 2.0    # <2s per chart
    vram_usage_gb: 4.0          # <4GB during inference
