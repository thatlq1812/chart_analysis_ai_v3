# =============================================================================
# SLM Training Configuration
# =============================================================================
# Configuration for fine-tuning Small Language Models on chart analysis tasks.
# See: .github/instructions/module-training.instructions.md

# =============================================================================
# Run Management (shared across all training scripts)
# =============================================================================
run_management:
  # Base directory for isolated training runs
  runs_dir: "runs"
  
  # Experiment tracking backend: "wandb", "tensorboard", "json", "none"
  # Fallback chain: wandb -> tensorboard -> json -> none
  tracking_backend: "json"
  
  # WandB settings (only used if tracking_backend = "wandb")
  wandb:
    project: "chart_analysis_ai_v3"
    entity: null                  # WandB team/user (null = personal)
    tags: []
  
  # TensorBoard settings (only used if tracking_backend = "tensorboard")
  tensorboard:
    flush_secs: 30

slm_training:
  # ---------------------------------------------------------------------------
  # Base Model Selection
  # ---------------------------------------------------------------------------
  # NOTE: base_model here is the default. Use train_slm_lora.py --model
  # to select from MODEL_REGISTRY at training time.
  base_model: "meta-llama/Llama-3.2-1B-Instruct"
  model_revision: "main"  # Pin for reproducibility
  
  # Candidates (use --model flag in train_slm_lora.py):
  # llama-1b:  meta-llama/Llama-3.2-1B-Instruct  (PRIMARY)
  # qwen-1.5b: Qwen/Qwen2.5-1.5B-Instruct
  # qwen-0.5b: Qwen/Qwen2.5-0.5B-Instruct
  # llama-3b:  meta-llama/Llama-3.2-3B-Instruct   (needs >24GB VRAM)
  
  # ---------------------------------------------------------------------------
  # LoRA Configuration
  # ---------------------------------------------------------------------------
  lora:
    rank: 16                    # LoRA rank (8-64)
    alpha: 32                   # LoRA alpha (typically 2x rank)
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
    bias: "none"
    task_type: "CAUSAL_LM"
  
  # ---------------------------------------------------------------------------
  # Training Parameters
  # ---------------------------------------------------------------------------
  training:
    num_train_epochs: 3
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8     # effective batch = 2 * 8 = 16
    learning_rate: 2.0e-4
    lr_scheduler_type: "cosine"
    warmup_ratio: 0.05
    weight_decay: 0.01
    max_seq_length: 1024            # P99.9=1576, P99=412 -> 1024 covers 99.8%
    fp16: false
    bf16: true                  # Cloud GPU (A100/RTX 3090+) supports bf16
    gradient_checkpointing: true
    optim: "paged_adamw_32bit"
    
    # Logging
    logging_steps: 10
    logging_first_step: true
    
    # Saving
    eval_steps: 100
    save_steps: 200
    save_total_limit: 3
    load_best_model_at_end: true
    metric_for_best_model: "eval_loss"
    greater_is_better: false
  
  # ---------------------------------------------------------------------------
  # Quantization (QLoRA for RTX 3060 6GB)
  # ---------------------------------------------------------------------------
  quantization:
    use_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "bfloat16"  # Match bf16 training
    bnb_4bit_use_double_quant: true
  
  # ---------------------------------------------------------------------------
  # Data
  # ---------------------------------------------------------------------------
  data:
    # Full dataset (v3):
    train_file: "data/slm_training_v3/train.json"
    val_file: "data/slm_training_v3/val.json"
    test_file: "data/slm_training_v3/test.json"
    # Mini dataset for model selection:
    # train_file: "data/slm_training_mini/train.json"
    # val_file: "data/slm_training_mini/val.json"
    
    # Format
    format: "chatml"            # ChatML conversation format
    max_samples: null            # null = use all, set number to limit
  
  # ---------------------------------------------------------------------------
  # Curriculum Learning
  # ---------------------------------------------------------------------------
  curriculum:
    enabled: true
    stages: [1, 2, 3, 4]
    current_stage: 1            # Start from Stage 1 (structure)
    # Stage 1: Chart type + axis labels (easy)
    # Stage 2: Value extraction + OCR correction
    # Stage 3: Trends + comparisons (multi-series)
    # Stage 4: Noisy OCR + complex layouts (hard)
  
  # ---------------------------------------------------------------------------
  # Output
  # ---------------------------------------------------------------------------
  output_dir: "models/slm/llama-3.2-1b-instruct-chart-lora-v4"
  hub_model_id: null            # HuggingFace Hub (optional)
  
  # ---------------------------------------------------------------------------
  # Evaluation Targets
  # ---------------------------------------------------------------------------
  evaluation:
    json_valid_rate: 0.95       # >95% valid JSON
    field_accuracy: 0.90        # >90% correct fields
    numeric_accuracy: 0.85      # >85% correct values (5% tolerance)
    ocr_correction_rate: 0.80   # >80% OCR errors fixed
    inference_latency_s: 2.0    # <2s per chart
    vram_usage_gb: 4.0          # <4GB during inference

# =============================================================================
# Chart Classifier Training
# =============================================================================
# Unified config for all chart type classifier experiments.
# Script: scripts/training/train_chart_classifier.py
#
# Quick mode switching:
#   4-class thesis run (default):
#     python scripts/training/train_chart_classifier.py
#
#   8-class research run:
#     python scripts/training/train_chart_classifier.py \
#       --override classifier.mode=8class
#
#   EfficientNet-B0 ablation:
#     python scripts/training/train_chart_classifier.py \
#       --override classifier.model.backbone=efficientnet_b0 \
#       --override classifier.output.model_name=efficientnet_b0_3class_v1
#
#   Smoke-test (200 samples / class):
#     python scripts/training/train_chart_classifier.py \
#       --override classifier.data.max_samples_per_class=200 \
#       --override classifier.training.epochs=5 \
#       --dry-run

classifier:

  # ---------------------------------------------------------------------------
  # Mode
  # ---------------------------------------------------------------------------
  # 3class (thesis scope): bar | line | pie
  # 8class (research):     area | bar | box | heatmap | histogram | line | pie | scatter
  mode: "3class"

  # ---------------------------------------------------------------------------
  # Class Definition
  # ---------------------------------------------------------------------------
  # Active when mode=3class.
  # Only bar / line / pie are trained. All other folders are skipped.
  classes_3class: ["bar", "line", "pie"]

  remap_3class:
    bar: bar
    line: line
    pie: pie
    # All other raw folders (area, heatmap, scatter, etc.) are absent
    # from this map and will be skipped by the dataset loader.

  # Active when mode=8class.
  # Only folders listed here are included; all other folders are skipped.
  classes_8class: ["area", "bar", "box", "heatmap", "histogram", "line", "pie", "scatter"]

  # ---------------------------------------------------------------------------
  # Data
  # ---------------------------------------------------------------------------
  data:
    classified_dir: "data/academic_dataset/classified_charts"
    image_extensions: [".png", ".jpg", ".jpeg", ".webp"]

    # Stratified split ratios (train / val / test) — must sum to 1.0
    split_ratio: [0.80, 0.10, 0.10]

    # null = use all; integer = cap per target class (useful for ablation)
    max_samples_per_class: null

    seed: 42

  # ---------------------------------------------------------------------------
  # Architecture
  # ---------------------------------------------------------------------------
  # Supported backbones (all from torchvision, ImageNet1K pretrained):
  #   resnet18           11.7M params   fast    good accuracy   (default)
  #   resnet34           21.8M params   medium  slightly better
  #   resnet50           25.6M params   slow    best ResNet
  #   efficientnet_b0     5.3M params   medium  best accuracy/size ratio
  #   efficientnet_b1     7.8M params   medium  marginally better than b0
  #   mobilenet_v3_small  2.5M params   fastest smallest  (edge deployment)
  #   mobilenet_v3_large  5.5M params   fast    good for production
  model:
    backbone: efficientnet_b0
    pretrained: true
    dropout: 0.3
    image_size: 224             # Same as ResNet-18 for fair ablation comparison

  # ---------------------------------------------------------------------------
  # Training Schedule
  # ---------------------------------------------------------------------------
  training:
    epochs: 60
    batch_size: 128             # RTX 3060 6GB + AMP + 160px => ~1.8GB VRAM, safe
    num_workers: 8              # Ryzen 7 6800H = 8 physical cores
    persistent_workers: true    # Keep workers alive between epochs (big speedup)
    prefetch_factor: 4          # 32GB RAM -> prefetch more batches

    freeze_backbone_epochs: 5   # Phase 1: only train head (faster convergence)
    frozen_lr: 5.0e-3           # LR during frozen phase
    learning_rate: 1.0e-3       # LR after backbone is unfrozen
    warmup_epochs: 3            # Linear warmup at start of each phase
    weight_decay: 1.0e-4
    lr_scheduler: cosine        # cosine (recommended) | step | plateau

    use_amp: true               # Mixed precision — requires CUDA
    label_smoothing: 0.1        # Prevent overconfidence on majority class (others=58%)
    log_interval_batches: 50
    save_top_k: 3               # Keep top K checkpoints by val_acc
    early_stopping_patience: 10 # Stop if val_acc does not improve for N epochs
                                # Counted separately per phase (Phase 1 + Phase 2)
                                # Set to 0 to disable

  # ---------------------------------------------------------------------------
  # Output
  # ---------------------------------------------------------------------------
  # model_name drives all output file names:
  #   models/weights/{model_name}_best.pt
  #   models/weights/{model_name}_results.json
  output:
    weights_dir: "models/weights"
    model_name: "efficientnet_b0_3class_v1"

  # ---------------------------------------------------------------------------
  # Benchmark Targets (thesis acceptance criteria)
  # ---------------------------------------------------------------------------
  evaluation:
    target_accuracy: 0.92
    target_f1_macro: 0.90
    target_f1_others: 0.85      # Not checked in 3-class mode
