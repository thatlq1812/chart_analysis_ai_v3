# =============================================================================
# YOLO Dataset Configuration - Geo-SLM Chart Analysis V3
# =============================================================================
# This file configures the dataset for YOLO training.
# 
# Usage:
#   yolo train model=yolov8n.pt data=config/yolo_chart_v3.yaml epochs=100
#
# Generated by: prepare_dataset_splits.py
# Updated: 2026-01-20
# =============================================================================

# Dataset root path (relative to this file or absolute)
path: ../data/training

# Train/Val/Test directories (relative to path)
train: images/train
val: images/val
test: images/test

# =============================================================================
# Class Configuration
# =============================================================================
# Option A: Single class (Chart Detection only)
# - Pros: Simpler, faster training, higher accuracy
# - Cons: No type classification
# - Use case: Stage 2 of pipeline (detect chart regions)

# Option B: Multi-class (Chart Type Classification)
# - Pros: Detect + Classify in one model
# - Cons: Requires labeled data with chart types
# - Use case: End-to-end chart analysis

# -----------------------------------------------------------------------------
# ACTIVE CONFIGURATION: Single Class (Chart Detection)
# -----------------------------------------------------------------------------
# This is recommended for Phase 1 training.
# Detection first, classification can be a separate model.

nc: 1  # Number of classes

names:
  0: chart

# -----------------------------------------------------------------------------
# ALTERNATIVE: Multi-class Configuration (Uncomment to use)
# -----------------------------------------------------------------------------
# nc: 6
#
# names:
#   0: bar_chart
#   1: line_chart
#   2: pie_chart
#   4: other_chart

# =============================================================================
# Training Hyperparameters (Optional - can override in CLI)
# =============================================================================
# These are suggestions, actual training should use CLI args

# Image size
# imgsz: 640

# Augmentation settings for charts
# hsv_h: 0.015  # Hue augmentation (reduce for charts)
# hsv_s: 0.4    # Saturation
# hsv_v: 0.4    # Value
# degrees: 0.0  # Rotation (disable for charts)
# translate: 0.1
# scale: 0.3
# flipud: 0.0   # Disable vertical flip for charts
# fliplr: 0.0   # Disable horizontal flip for charts
# mosaic: 0.5   # Mosaic augmentation

# =============================================================================
# Dataset Statistics (Updated after prepare_dataset_splits.py)
# =============================================================================
# Expected totals after mining:
# - ChartQA (HuggingFace): ~20,000 images
# - ArXiv Mining: ~5,000 images
# - Synthetic: ~1,000 images (optional)
# - Total: ~26,000 images
#
# Split ratios: 80% train, 10% val, 10% test
# - Train: ~20,800 images
# - Val: ~2,600 images
# - Test: ~2,600 images
