# Model Configuration
# Paths and settings for AI models

yolo:
  # Chart detection model
  path: "models/weights/chart_detector.pt"
  device: "auto"  # auto, cpu, cuda, mps
  input_size: 640
  confidence_threshold: 0.5
  iou_threshold: 0.45
  max_detections: 10

classifier:
  # Chart type classification
  # EfficientNet-B0 3-class | test_acc=97.54% | macro_f1=94.63% | trained 2026-03-12
  # Ablation: beats ResNet-18 3-class (95.95% / 92.62%) by +1.59% acc, +2.01% F1
  model: "efficientnet_b0"
  path: "models/weights/efficientnet_b0_3class_v1_best.pt"
  onnx_path: "models/onnx/efficientnet_b0_3class_v1.onnx"
  device: "auto"
  confidence_threshold: 0.70  # Below this → label as unknown (not bar/line/pie)
  classes:
    - bar
    - line
    - pie

ocr:
  # OCR engine configuration
  engine: "paddleocr"  # paddleocr, tesseract
  
  paddleocr:
    use_gpu: true
    lang: "en"
    show_log: false
    use_angle_cls: true
    
  tesseract:
    lang: "eng"
    config: "--psm 6"
    oem: 3

slm:
  # Small Language Model for reasoning (local inference)
  name: "Qwen/Qwen2.5-1.5B-Instruct"
  device: "auto"
  max_tokens: 512
  temperature: 0.3
  top_p: 0.9
  
  # LoRA adapter (after training, uncomment)
  # lora_path: "models/slm/qwen2.5-1.5b-chart-lora/final"
  # merged_path: "models/slm/qwen2.5-1.5b-chart-merged"
  
  # Fallback to rules if SLM fails
  fallback_to_rules: true
  timeout_seconds: 30

vintern:
  # Vintern-1B-v3.5 fine-tuned by XHoang04 team member — local chart QA model
  # Used as local_slm alternative for DATA_EXTRACTION + QA tasks
  path: "models/slm/vintern_finetuned"
  device: "auto"
  max_new_tokens: 1024
  # Requires transformers==4.44.2 (same as main venv)
  # Architecture: InternVL (vision encoder + language decoder)

paddleocr_vl:
  # PaddleOCR-VL — specialized chart data extraction model (Vision-Language)
  # Runs as microservice (paddle_server.py, port 8001) due to transformers>=4.45 conflict
  path: "models/paddleocr_vl"
  server_url: "http://localhost:8001"
  max_new_tokens: 512
  # To start: python paddle_server.py
  # Requires separate venv with transformers>=4.45

# =============================================================================
# AI Routing Configuration (NEW - v2.0.0)
# =============================================================================
# Multi-provider routing with fallback chains.
# See: .github/instructions/module-reasoning.instructions.md

ai_routing:
  confidence_threshold: 0.7     # Below this, try next provider
  timeout_seconds: 30           # Per-provider timeout
  max_retries_per_provider: 2
  
  # Provider configurations
  providers:
    local_slm:
      enabled: false              # Enable after training
      model_path: "models/slm/qwen2.5-1.5b-chart-merged"
      device: "auto"
      priority: 1                 # Highest priority (try first)
    
    gemini:
      enabled: true
      model: "gemini-2.5-flash"  # Upgraded 2026-03-05 (was gemini-2.0-flash)
      api_key_env: "GOOGLE_API_KEY"
      priority: 2
    
    openai:
      enabled: false
      model: "gpt-4o-mini"
      api_key_env: "OPENAI_API_KEY"
      priority: 3

    paddlevl:
      enabled: true
      server_url: "http://localhost:8001"  # paddle_server.py must be running
      timeout: 300.0                        # PaddleOCR-VL can be slow (GPU first call)
      max_new_tokens: 512
      priority: 1                           # Preferred for DATA_EXTRACTION tasks
  
  # Task-specific fallback chains
  fallback_chains:
    chart_reasoning: ["local_slm", "gemini", "openai"]
    ocr_correction: ["local_slm", "gemini"]
    description_gen: ["local_slm", "gemini", "openai"]
    data_validation: ["gemini", "openai"]
    data_extraction: ["paddlevl", "gemini"]
